<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../css/main.css" />
    <title>Factura Digital</title>
  </head>
  <body>
    <div id="loading" style="text-align: center; margin-top: 100px; font-family: 'Poppins', sans-serif; color: #666;">
      <i class="fa-solid fa-circle-notch fa-spin" style="font-size: 2rem; margin-bottom: 10px; color: #0070f3;"></i>
      <p>Buscando factura...</p>
    </div>

    <div class="factura" id="factura" style="display: none;">
      <div class="header">
        <h1>FACTURA</h1>
        <p id="id_factura"></p>
      </div>

      <div class="info">
        <div><strong>Cliente:</strong> <span id="cliente"></span></div>
        <div><strong>Cédula:</strong> <span id="cedula"></span></div>
        <div><strong>Teléfono:</strong> <span id="telefono"></span></div>
        <div><strong>Vendedor:</strong> <span id="vendedor"></span></div>
        <div><strong>Fecha:</strong> <span id="fecha"></span></div>
      </div>

      <table id="tabla_productos">
        <thead>
          <tr>
            <th>Producto</th>
            <th>Cantidad</th>
            <th>Precio Unit.</th>
            <th>Total</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>

      <div class="total">
        <div>Subtotal USD: $<span id="subtotal_usd"></span></div>
        <div>Descuento USD: $<span id="descuento_usd"></span></div>
        <div><strong>Total USD: $<span id="total_usd"></span></strong></div>
        <div>Total Bs: <span id="total_bs"></span> Bs.F</div>
      </div>

      <div style="text-align:center; margin-top:40px; color:#666;">
        <p><strong>Método de pago:</strong> <span id="metodo_pago"></span></p>
        <p id="referencia_info"></p>
      </div>
    </div>

    <script>
      async function cargarFactura() {
        const params = new URLSearchParams(window.location.search);
        const id = params.get('id');

        if (!id) {
          mostrarError("No se proporcionó un ID de factura válido.");
          return;
        }

        const SUPABASE_URL = 'https://etfdwjbgrbxfuoltpgqa.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV0ZmR3amJncmJ4ZnVvbHRwZ3FhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI3OTg0NDQsImV4cCI6MjA5ODM3NDQ0NH0.Ap4HsuDjA43fKlTA8DP_ljwIn6vnE_pEw1LiMmFngvU';

        try {
          // Consultar ambas tablas en paralelo para máxima velocidad
          const [resFactura, resDetalles] = await Promise.all([
            fetch(`${SUPABASE_URL}/rest/v1/facturas?id_factura=eq.${id}&select=*`, {
              headers: {
                'apikey': SUPABASE_ANON_KEY,
                'Authorization': `Bearer ${SUPABASE_ANON_KEY}`
              }
            }),
            fetch(`${SUPABASE_URL}/rest/v1/factura_detalles?id_factura=eq.${id}&select=*`, {
              headers: {
                'apikey': SUPABASE_ANON_KEY,
                'Authorization': `Bearer ${SUPABASE_ANON_KEY}`
              }
            })
          ]);

          const facturasData = await resFactura.json();
          const detalles = await resDetalles.json();

          // Validar si la factura realmente existe
          if (!facturasData || facturasData.length === 0) {
            mostrarError(`La factura con el ID ${id} no fue encontrada.`);
            return;
          }

          const factura = facturasData[0];

          // Renderizar datos de cabecera
          document.getElementById('id_factura').textContent = `N° ${factura.id_factura}`;
          document.getElementById('cliente').textContent = `${factura.nombre} ${factura.apellido || ''}`.trim();
          document.getElementById('cedula').textContent = factura.cedula || 'N/A';
          document.getElementById('telefono').textContent = factura.telefono || 'N/A';
          document.getElementById('vendedor').textContent = factura.vendedor || 'Cajero General';
          
          // Soporta columna 'fecha' o la por defecto de Supabase 'created_at'
          const fechaOrigen = factura.fecha || factura.created_at;
          document.getElementById('fecha').textContent = fechaOrigen ? new Date(fechaOrigen).toLocaleString('es-VE') : 'N/A';

          // Renderizar montos formateados a dos decimales de forma segura
          document.getElementById('subtotal_usd').textContent = Number(factura.subtotal_usd || 0).toFixed(2);
          document.getElementById('descuento_usd').textContent = Number(factura.descuento_usd || 0).toFixed(2);
          document.getElementById('total_usd').textContent = Number(factura.total_usd || 0).toFixed(2);
          document.getElementById('total_bs').textContent = Number(factura.total_bs || 0).toFixed(2);

          document.getElementById('metodo_pago').textContent = factura.metodo_pago || 'N/A';
          
          const refInfo = document.getElementById('referencia_info');
          if (factura.referencia) {
            refInfo.textContent = `Referencia: ${factura.referencia} ${factura.banco ? `- ${factura.banco}` : ''}`;
          } else {
            refInfo.textContent = '';
          }

          // Renderizar tabla de productos distribuidos
          const tbody = document.querySelector('#tabla_productos tbody');
          tbody.innerHTML = '';
          
          if (detalles && detalles.length > 0) {
            detalles.forEach(d => {
              const tr = document.createElement('tr');
              tr.innerHTML = `
                <td>${d.nombre_producto}</td>
                <td>${d.cantidad}</td>
                <td>$${Number(d.precio_unitario || 0).toFixed(2)}</td>
                <td>$${Number(d.precio_total || 0).toFixed(2)}</td>
              `;
              tbody.appendChild(tr);
            });
          } else {
            tbody.innerHTML = `<tr><td colspan="4" style="text-align:center; color:#999;">No hay productos registrados en esta factura.</td></tr>`;
          }

          // Intercambiar pantallas: Ocultar loading y mostrar factura
          document.getElementById('loading').style.display = 'none';
          document.getElementById('factura').style.display = 'block';

        } catch (e) {
          console.error("Error cargando la factura:", e);
          mostrarError("Ocurrió un error al conectar con el servidor de base de datos.");
        }
      }

      function mostrarError(mensaje) {
        document.getElementById('loading').style.display = 'none';
        const facturaDiv = document.getElementById('factura');
        facturaDiv.innerHTML = `
          <div style="text-align:center; margin-top: 50px; font-family:'Poppins', sans-serif; color: #e00;">
            <i class="fa-solid fa-triangle-exclamation" style="font-size: 3rem; margin-bottom:15px;"></i>
            <h2>No se pudo cargar la factura</h2>
            <p style="color:#555;">${mensaje}</p>
          </div>
        `;
        facturaDiv.style.display = 'block';
      }

      window.onload = cargarFactura;
    </script>
  </body>
</html>
